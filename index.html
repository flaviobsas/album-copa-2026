
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.container { padding: 1rem 0; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.stats { display: flex; gap: 8px; flex-wrap: wrap; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 14px; text-align: center; min-width: 80px; }
.stat .num { font-size: 20px; font-weight: 500; }
.stat .lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.num-total { color: var(--color-text-primary); }
.num-tengo { color: #1D9E75; }
.num-falta { color: #E24B4A; }
.num-repetida { color: #BA7517; }
.controls { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
.controls input { flex: 1; min-width: 160px; padding: 7px 12px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.filter-btn { padding: 6px 14px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); transition: all 0.15s; }
.filter-btn.active-all { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
.filter-btn.active-tengo { background: #E1F5EE; color: #0F6E56; border-color: #5DCAA5; font-weight: 500; }
.filter-btn.active-falta { background: #FCEBEB; color: #A32D2D; border-color: #F09595; font-weight: 500; }
.filter-btn.active-repetida { background: #FAEEDA; color: #854F0B; border-color: #EF9F27; font-weight: 500; }
.groups { display: flex; flex-direction: column; gap: 1rem; }
.group-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.group-header { padding: 8px 14px; background: var(--color-background-secondary); display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
.group-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
.group-progress { font-size: 12px; color: var(--color-text-secondary); }
.progress-bar-wrap { height: 4px; background: var(--color-background-secondary); }
.progress-bar { height: 4px; background: #1D9E75; transition: width 0.3s; }
.teams-grid { display: flex; flex-wrap: wrap; gap: 1rem; padding: 12px 14px; }
.team-section { min-width: 100px; }
.team-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 5px; letter-spacing: 0.03em; text-transform: uppercase; }
.stickers { display: flex; flex-wrap: wrap; gap: 4px; }
.sticker { width: 32px; height: 32px; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; cursor: pointer; transition: all 0.1s; background: var(--color-background-primary); color: var(--color-text-secondary); position: relative; user-select: none; }
.sticker:hover { border-color: var(--color-border-primary); }
.sticker.tengo { background: #E1F5EE; border-color: #5DCAA5; color: #0F6E56; }
.sticker.repetida { background: #FAEEDA; border-color: #EF9F27; color: #854F0B; }
.sticker.repetida::after { content: attr(data-count); position: absolute; top: -5px; right: -5px; background: #EF9F27; color: white; font-size: 8px; border-radius: 50%; width: 13px; height: 13px; display: flex; align-items: center; justify-content: center; font-weight: 500; }
.sticker.hidden { display: none; }
.group-body { display: block; }
.group-body.collapsed { display: none; }
.actions { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.action-btn { padding: 7px 16px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); transition: all 0.15s; }
.action-btn:hover { background: var(--color-background-secondary); }
.cambios-section { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 12px 14px; margin-bottom: 1rem; }
.cambios-title { font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--color-text-primary); }
.cambios-list { font-size: 12px; color: var(--color-text-secondary); max-height: 80px; overflow-y: auto; line-height: 1.8; }
.toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--color-background-primary); border: 0.5px solid var(--color-border-primary); border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 13px; font-weight: 500; box-shadow: none; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 100; color: var(--color-text-primary); }
.toast.show { opacity: 1; }
</style>

<div class="container">
<h2 class="sr-only">Tracker de figuritas - Álbum Copa del Mundo 2026 Panini</h2>

<div class="header">
  <div style="font-size:18px;font-weight:500;color:var(--color-text-primary);">Álbum Copa 2026 🏆</div>
  <div class="stats">
    <div class="stat"><div class="num num-total" id="s-total">0</div><div class="lbl">Total</div></div>
    <div class="stat"><div class="num num-tengo" id="s-tengo">0</div><div class="lbl">Tengo</div></div>
    <div class="stat"><div class="num num-falta" id="s-falta">0</div><div class="lbl">Me falta</div></div>
    <div class="stat"><div class="num num-repetida" id="s-repetida">0</div><div class="lbl">Repetidas</div></div>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar equipo o figurita..." oninput="applyFilter()">
  <button class="filter-btn active-all" data-f="all" onclick="setFilter('all')">Todas</button>
  <button class="filter-btn" data-f="tengo" onclick="setFilter('tengo')">Tengo</button>
  <button class="filter-btn" data-f="falta" onclick="setFilter('falta')">Me falta</button>
  <button class="filter-btn" data-f="repetida" onclick="setFilter('repetida')">Repetidas</button>
</div>

<div class="actions">
  <button class="action-btn" onclick="exportarFaltantes()">Exportar faltantes ↗</button>
  <button class="action-btn" onclick="exportarRepetidas()">Exportar repetidas ↗</button>
  <button class="action-btn" onclick="resetear()">Reiniciar álbum</button>
</div>

<div id="cambios-wrap" class="cambios-section" style="display:none">
  <div class="cambios-title">Últimos cambios</div>
  <div class="cambios-list" id="cambios-list"></div>
</div>

<div class="groups" id="groups-container"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const GROUPS = [
  { name: "Grupo A", teams: { MEX:20, RSA:20, KOR:20, CZE:20 } },
  { name: "Grupo B", teams: { CAN:20, BIH:20, QAT:20, SUI:20 } },
  { name: "Grupo C", teams: { BRA:20, MAR:20, HAI:20, SCO:20 } },
  { name: "Grupo D", teams: { USA:20, PAR:20, AUS:20, TUR:20 } },
  { name: "Grupo E", teams: { GER:20, CUW:20, CIV:20, ECU:20 } },
  { name: "Grupo F", teams: { NED:20, JPN:20, SWE:20, TUN:20 } },
  { name: "Grupo G", teams: { BEL:20, EGV:20, IRN:20, NZL:20 } },
  { name: "Grupo H", teams: { ESP:20, CPV:20, KSA:20, URU:20 } },
  { name: "Grupo I", teams: { FRA:20, SEN:20, IRQ:20, NOR:20 } },
  { name: "Grupo J", teams: { ARG:20, ALG:20, AUT:20, JOR:20 } },
  { name: "Grupo K", teams: { POR:20, COD:20, UZB:20, COL:20 } },
  { name: "Grupo L", teams: { ENG:20, CRO:20, GHA:20, PAN:20 } },
  { name: "Especiales", teams: { OO:1, FWC:19, CC:14 } },
];

const TEAM_FULL = {
  MEX:"México", RSA:"Sudáfrica", KOR:"Corea del Sur", CZE:"Rep. Checa",
  CAN:"Canadá", BIH:"Bosnia", QAT:"Qatar", SUI:"Suiza",
  BRA:"Brasil", MAR:"Marruecos", HAI:"Haití", SCO:"Escocia",
  USA:"EE.UU.", PAR:"Paraguay", AUS:"Australia", TUR:"Turquía",
  GER:"Alemania", CUW:"Curazao", CIV:"Costa de Marfil", ECU:"Ecuador",
  NED:"Países Bajos", JPN:"Japón", SWE:"Suecia", TUN:"Túnez",
  BEL:"Bélgica", EGV:"Egipto", IRN:"Irán", NZL:"Nueva Zelanda",
  ESP:"España", CPV:"Cabo Verde", KSA:"Arabia Saudita", URU:"Uruguay",
  FRA:"Francia", SEN:"Senegal", IRQ:"Irak", NOR:"Noruega",
  ARG:"Argentina", ALG:"Argelia", AUT:"Austria", JOR:"Jordania",
  POR:"Portugal", COD:"Rep. Dem. Congo", UZB:"Uzbekistán", COL:"Colombia",
  ENG:"Inglaterra", CRO:"Croacia", GHA:"Ghana", PAN:"Panamá",
  OO:"Portada", FWC:"FWC Especial", CC:"CC Especial",
};

let state = {};
let cambios = [];
let curFilter = 'all';
let collapsed = {};

function stateKey(team, num) { return `${team}_${num}`; }

function loadState() {
  try { const s = localStorage.getItem('copa2026'); if(s) state = JSON.parse(s); } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('copa2026', JSON.stringify(state)); } catch(e) {}
}

function getSticker(team, num) { return state[stateKey(team,num)] || 0; }

function cycleSticker(team, num) {
  const k = stateKey(team,num);
  const cur = state[k] || 0;
  if(cur === 0) { state[k] = 1; logCambio(team, num, 'agregada'); }
  else if(cur === 1) { state[k] = 2; logCambio(team, num, 'marcada x2'); }
  else if(cur === 2) { state[k] = 3; logCambio(team, num, 'marcada x3'); }
  else { delete state[k]; logCambio(team, num, 'quitada'); }
  saveState();
  updateSticker(team, num);
  updateStats();
  updateGroupProgress();
}

function logCambio(team, num, accion) {
  const label = num === '' ? team : `${team} ${num}`;
  cambios.unshift(`${label} — ${accion}`);
  if(cambios.length > 30) cambios.pop();
  const wrap = document.getElementById('cambios-wrap');
  const list = document.getElementById('cambios-list');
  wrap.style.display = '';
  list.textContent = cambios.slice(0,10).join('\n');
}

function updateSticker(team, num) {
  const k = stateKey(team, num);
  const el = document.getElementById(`s-${k}`);
  if(!el) return;
  const v = state[k] || 0;
  el.className = 'sticker';
  if(v === 1) el.className += ' tengo';
  else if(v >= 2) { el.className += ' repetida'; el.setAttribute('data-count', v > 2 ? v : ''); }
  applyFilterToSticker(el);
}

function applyFilterToSticker(el) {
  const f = curFilter;
  const isTengo = el.classList.contains('tengo');
  const isRepetida = el.classList.contains('repetida');
  if(f === 'all') el.classList.remove('hidden');
  else if(f === 'tengo') el.classList.toggle('hidden', !isTengo && !isRepetida);
  else if(f === 'falta') el.classList.toggle('hidden', isTengo || isRepetida);
  else if(f === 'repetida') el.classList.toggle('hidden', !isRepetida);
}

function updateStats() {
  let total=0, tengo=0, repetidas=0;
  GROUPS.forEach(g => {
    Object.entries(g.teams).forEach(([team, count]) => {
      for(let i=1; i<=count; i++) {
        total++;
        const v = state[stateKey(team,i)] || 0;
        if(v >= 1) tengo++;
        if(v >= 2) repetidas += (v-1);
      }
    });
  });
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-tengo').textContent = tengo;
  document.getElementById('s-falta').textContent = total - tengo;
  document.getElementById('s-repetida').textContent = repetidas;
}

function updateGroupProgress() {
  GROUPS.forEach(g => {
    let tot=0, have=0;
    Object.entries(g.teams).forEach(([team, count]) => {
      for(let i=1; i<=count; i++) {
        tot++;
        if((state[stateKey(team,i)] || 0) >= 1) have++;
      }
    });
    const bar = document.getElementById(`prog-${g.name.replace(/\s/g,'')}`);
    const lbl = document.getElementById(`lbl-${g.name.replace(/\s/g,'')}`);
    if(bar) bar.style.width = (tot ? (have/tot*100).toFixed(0) : 0) + '%';
    if(lbl) lbl.textContent = `${have}/${tot}`;
  });
}

function setFilter(f) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
    if(b.dataset.f === f) b.className += ' active-' + f;
  });
  document.querySelectorAll('.sticker').forEach(el => applyFilterToSticker(el));
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.team-section').forEach(ts => {
    const label = ts.querySelector('.team-label').textContent.toLowerCase();
    ts.style.display = (q && !label.includes(q)) ? 'none' : '';
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function exportarFaltantes() {
  let lines = ['FIGURITAS QUE ME FALTAN - Copa 2026\n'];
  GROUPS.forEach(g => {
    let faltanGrupo = [];
    Object.entries(g.teams).forEach(([team, count]) => {
      const faltan = [];
      for(let i=1; i<=count; i++) if(!(state[stateKey(team,i)])) faltan.push(`${team} ${i}`);
      if(faltan.length) faltanGrupo.push(faltan.join(', '));
    });
    if(faltanGrupo.length) lines.push(`${g.name}:\n${faltanGrupo.join('\n')}`);
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Lista de faltantes copiada!')).catch(() => {
    const w = window.open(); w.document.write('<pre>'+text+'</pre>');
  });
}

function exportarRepetidas() {
  let lines = ['FIGURITAS REPETIDAS - Copa 2026\n'];
  GROUPS.forEach(g => {
    let rep = [];
    Object.entries(g.teams).forEach(([team, count]) => {
      for(let i=1; i<=count; i++) {
        const v = state[stateKey(team,i)] || 0;
        if(v >= 2) rep.push(`${team} ${i} (x${v-1})`);
      }
    });
    if(rep.length) lines.push(`${g.name}:\n${rep.join(', ')}`);
  });
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('Lista de repetidas copiada!')).catch(() => {
    const w = window.open(); w.document.write('<pre>'+text+'</pre>');
  });
}

function resetear() {
  if(!confirm('¿Reiniciar todo el álbum? Se perderán todos tus datos.')) return;
  state = {};
  saveState();
  document.querySelectorAll('.sticker').forEach(el => {
    el.className = 'sticker';
    el.removeAttribute('data-count');
    applyFilterToSticker(el);
  });
  updateStats();
  updateGroupProgress();
  cambios = [];
  document.getElementById('cambios-wrap').style.display='none';
  showToast('Álbum reiniciado');
}

function buildUI() {
  const container = document.getElementById('groups-container');
  GROUPS.forEach(g => {
    const gid = g.name.replace(/\s/g,'');
    const card = document.createElement('div');
    card.className = 'group-card';

    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `<span class="group-title">${g.name}</span><span class="group-progress" id="lbl-${gid}">0/0</span>`;
    header.onclick = () => {
      collapsed[gid] = !collapsed[gid];
      body.className = 'group-body' + (collapsed[gid] ? ' collapsed' : '');
    };
    card.appendChild(header);

    const progWrap = document.createElement('div');
    progWrap.className = 'progress-bar-wrap';
    const progBar = document.createElement('div');
    progBar.className = 'progress-bar';
    progBar.id = `prog-${gid}`;
    progBar.style.width = '0%';
    progWrap.appendChild(progBar);
    card.appendChild(progWrap);

    const body = document.createElement('div');
    body.className = 'group-body';

    const grid = document.createElement('div');
    grid.className = 'teams-grid';

    Object.entries(g.teams).forEach(([team, count]) => {
      const sec = document.createElement('div');
      sec.className = 'team-section';
      const fullName = TEAM_FULL[team] || team;
      sec.innerHTML = `<div class="team-label">${team} — ${fullName}</div>`;
      const stickersDiv = document.createElement('div');
      stickersDiv.className = 'stickers';
      for(let i=1; i<=count; i++) {
        const s = document.createElement('div');
        s.className = 'sticker';
        s.id = `s-${stateKey(team,i)}`;
        s.textContent = i;
        s.title = `${team} ${i} — clic: agregar, 2 clics: repetida, 3+, clic largo: quitar`;
        s.onclick = () => cycleSticker(team, i);
        stickersDiv.appendChild(s);
      }
      sec.appendChild(stickersDiv);
      grid.appendChild(sec);
    });

    body.appendChild(grid);
    card.appendChild(body);
    container.appendChild(card);
  });
}

loadState();
buildUI();

document.querySelectorAll('.sticker').forEach(el => {
  const parts = el.id.replace('s-','').split('_');
  const team = parts[0], num = parseInt(parts[1]);
  const v = state[stateKey(team,num)] || 0;
  if(v===1) el.className='sticker tengo';
  else if(v>=2) { el.className='sticker repetida'; el.setAttribute('data-count', v>2?v:''); }
});

updateStats();
updateGroupProgress();
</script>
